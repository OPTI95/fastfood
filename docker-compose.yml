version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fastfood_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fastfood_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastfood-network

  backend:
    build: ./backend
    container_name: fastfood_backend
    restart: always
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fastfood_db
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    networks:
      - fastfood-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_WHATSAPP: ${REACT_APP_WHATSAPP}
    container_name: fastfood_frontend
    restart: always
    networks:
      - fastfood-network

  nginx:
    image: nginx:alpine
    container_name: fastfood_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fastfood-network

volumes:
  postgres_data:

networks:
  fastfood-network:
    driver: bridge
