version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fastfood_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fastfood-network

  backend:
    build: ./backend
    container_name: fastfood_backend
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fastfood_db
      PORT: 5000
      JWT_SECRET: your_super_secret_key_change_me
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - fastfood-network

  frontend:
    build: ./frontend
    container_name: fastfood_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    networks:
      - fastfood-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  fastfood-network:
    driver: bridge
